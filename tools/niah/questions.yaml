    The file ggml/src/ggml-cuda/pflash-bsa.cu defines a templated GPU kernel.
    What are the three integer values of the template parameter D that have
    explicit kernel instantiations in this file?
  expected_substrings: ["64", "128", "256"]
  min_recovered: 3
  answer_files: ["ggml/src/ggml-cuda/pflash-bsa.cu"]

- id: A2
  type: A
  difficulty: easy
  question: >
    In include/pflash.h, what is the default value assigned to the keep_ratio
    field of pflash_params?
  expected_substrings: ["0.75"]
  min_recovered: 1
  answer_files: ["include/pflash.h"]

- id: A3
